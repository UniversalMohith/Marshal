<svg viewBox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6b7b"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b9770e"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b6cb0"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1100" height="560" rx="14" fill="#f7fafc"/>
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0a2540">Marshal — self-governing multi-agent reasoning on Microsoft Foundry</text>

  <!-- input -->
  <rect x="24" y="250" width="124" height="52" rx="26" fill="#0a2540"/>
  <text x="86" y="281" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">User question</text>

  <rect x="176" y="250" width="120" height="52" rx="10" fill="#ffffff" stroke="#0a2540" stroke-width="1.5"/>
  <text x="236" y="274" text-anchor="middle" fill="#0a2540" font-size="13" font-weight="600">Input guardrail</text>
  <text x="236" y="290" text-anchor="middle" fill="#5b6b7b" font-size="9.5">reject empty / unsafe</text>

  <!-- foundry panel -->
  <rect x="320" y="86" width="560" height="330" rx="16" fill="#0a2540" stroke="#50e6ff" stroke-width="2"/>
  <text x="340" y="114" fill="#50e6ff" font-size="15" font-weight="700">Microsoft Foundry · Agent Service</text>
  <text x="340" y="132" fill="#9fd8e8" font-size="10.5">each role is a prompt agent on a Foundry-deployed model (Responses API)</text>

  <!-- orchestrator -->
  <rect x="470" y="150" width="260" height="48" rx="8" fill="#14395f" stroke="#50e6ff" stroke-width="1.3"/>
  <text x="600" y="170" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Orchestrator</text>
  <text x="600" y="186" text-anchor="middle" fill="#bfe6f2" font-size="10">decompose + budget allotment</text>

  <!-- workers -->
  <rect x="345" y="228" width="150" height="46" rx="8" fill="#14395f" stroke="#50e6ff" stroke-width="1.3"/>
  <text x="420" y="249" text-anchor="middle" fill="#ffffff" font-size="12.5" font-weight="600">Worker</text>
  <text x="420" y="264" text-anchor="middle" fill="#bfe6f2" font-size="9.5">solve 1 sub-task</text>
  <rect x="525" y="228" width="150" height="46" rx="8" fill="#14395f" stroke="#50e6ff" stroke-width="1.3"/>
  <text x="600" y="249" text-anchor="middle" fill="#ffffff" font-size="12.5" font-weight="600">Worker</text>
  <text x="600" y="264" text-anchor="middle" fill="#bfe6f2" font-size="9.5">solve 1 sub-task</text>
  <rect x="705" y="228" width="150" height="46" rx="8" fill="#14395f" stroke="#50e6ff" stroke-width="1.3"/>
  <text x="780" y="249" text-anchor="middle" fill="#ffffff" font-size="12.5" font-weight="600">Worker</text>
  <text x="780" y="264" text-anchor="middle" fill="#bfe6f2" font-size="9.5">solve 1 sub-task</text>

  <!-- critic + synthesiser -->
  <rect x="392" y="306" width="206" height="48" rx="8" fill="#14395f" stroke="#50e6ff" stroke-width="1.3"/>
  <text x="495" y="326" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Critic</text>
  <text x="495" y="342" text-anchor="middle" fill="#bfe6f2" font-size="10">grade · re-scope the weak</text>
  <rect x="638" y="306" width="206" height="48" rx="8" fill="#14395f" stroke="#50e6ff" stroke-width="1.3"/>
  <text x="741" y="326" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Synthesiser</text>
  <text x="741" y="342" text-anchor="middle" fill="#bfe6f2" font-size="10">fuse graded answers</text>

  <!-- final answer -->
  <rect x="922" y="304" width="150" height="52" rx="26" fill="#50e6ff"/>
  <text x="997" y="328" text-anchor="middle" fill="#0a2540" font-size="13" font-weight="700">Final answer</text>
  <text x="997" y="344" text-anchor="middle" fill="#0a4a63" font-size="9.5">with citations</text>

  <!-- flow arrows -->
  <line x1="148" y1="276" x2="174" y2="276" stroke="#5b6b7b" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M296,266 C360,230 410,210 468,180" fill="none" stroke="#5b6b7b" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- orchestrator -> workers -->
  <line x1="560" y1="198" x2="440" y2="226" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="600" y1="198" x2="600" y2="226" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="640" y1="198" x2="760" y2="226" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- workers -> critic -->
  <line x1="430" y1="274" x2="470" y2="304" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="595" y1="274" x2="520" y2="304" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="770" y1="274" x2="555" y2="304" stroke="#5b6b7b" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- critic -> synthesiser -->
  <line x1="598" y1="330" x2="636" y2="330" stroke="#5b6b7b" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="617" y="300" text-anchor="middle" fill="#5b6b7b" font-size="9">graded</text>

  <!-- critic -> orchestrator (re-scope, dashed red) -->
  <path d="M392,322 C330,312 348,200 468,176" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrR)"/>
  <text x="352" y="250" text-anchor="middle" fill="#c0392b" font-size="9.5" font-weight="600">weak →</text>
  <text x="352" y="262" text-anchor="middle" fill="#c0392b" font-size="9.5" font-weight="600">re-scope</text>

  <!-- synthesiser -> final -->
  <line x1="844" y1="330" x2="920" y2="330" stroke="#5b6b7b" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- budget governor -->
  <rect x="320" y="442" width="560" height="46" rx="10" fill="#fff7e6" stroke="#f0a202" stroke-width="1.6"/>
  <text x="600" y="463" text-anchor="middle" fill="#7a4f01" font-size="13" font-weight="700">Budget Governor</text>
  <text x="600" y="479" text-anchor="middle" fill="#9a6700" font-size="10">caps spend · holds a reserve · degrades Full → Reduced → Minimal → Exhausted</text>
  <line x1="440" y1="442" x2="440" y2="418" stroke="#b9770e" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrA)"/>
  <line x1="600" y1="442" x2="600" y2="418" stroke="#b9770e" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrA)"/>
  <line x1="760" y1="442" x2="760" y2="418" stroke="#b9770e" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrA)"/>
  <text x="905" y="468" fill="#9a6700" font-size="9.5">meters every call</text>

  <!-- grounding -->
  <rect x="24" y="372" width="256" height="84" rx="10" fill="#eef6ff" stroke="#2b6cb0" stroke-width="1.4"/>
  <text x="38" y="393" fill="#1a4971" font-size="13" font-weight="700">Grounding</text>
  <text x="38" y="412" fill="#1a4971" font-size="10.5">· Project notes — offline keyword overlap</text>
  <text x="38" y="429" fill="#1a4971" font-size="10.5">· Foundry IQ — Azure AI Search</text>
  <text x="50" y="444" fill="#1a4971" font-size="10.5">agentic retrieval (Microsoft IQ)</text>
  <path d="M280,398 C330,360 345,300 392,260" fill="none" stroke="#2b6cb0" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrB)"/>
  <text x="300" y="330" fill="#2b6cb0" font-size="9.5" font-weight="600">ranked passages → cite [n]</text>

  <!-- caption + legend -->
  <text x="40" y="528" fill="#5b6b7b" font-size="11">Governance and self-correction wrap the Foundry agents into a system that grades its own work, never overspends, and grounds every claim.</text>
  <text x="40" y="545" fill="#5b6b7b" font-size="10">— — →  self-correction (red) · governance / grounding (amber, blue)</text>
</svg>
