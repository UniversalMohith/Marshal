function githubUnlink(){ store.repo=''; save('marshal-repo',''); ghTree=null; toast('Repository unlinked.'); render(); }
// Push a card's drafted files to a branch on the linked repo, ready for a pull request.
async function githubPushCard(p, t){
  const L=repoLinks(); if(!L){ toast('Link a repo first, on the GitHub tab.'); return; }
  if(!ghState || !ghState.connected){ toast('Connect GitHub first, on the GitHub tab.'); return; }
  const files=(t.files||[]).filter(f=>f.path && f.content!=null && f.content!=='').map(f=>({path:f.path, content:f.content}));
  if(!files.length){ uiInfo({title:'Nothing to push', body:'This card has no files with content yet. Open a file and draft or paste code into it first.'}); return; }
  const slug=(t.title||'update').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40)||'update';
  const r=await uiPrompt({title:'Push to GitHub', fields:[
    {id:'branch',label:'Branch',value:'marshal/'+slug,hint:'A new or existing branch. Your default branch stays untouched.'},
    {id:'message',label:'Commit message',value:'Marshal: '+(t.title||'update')}
  ], okText:'Push '+files.length+' file(s)'});
  if(!r) return;
  toast('Pushing '+files.length+' file(s) to GitHub…');
  try{
    const res=await fetch('/github/push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({repo:L.slug, files, branch:(r.branch||'').trim(), message:(r.message||'').trim()})});
    const d=await res.json();
    if(!d.ok){ uiInfo({title:'Push failed', body:d.error||'Failed.'}); return; }
    showModal('<h3>Pushed to GitHub</h3><p class="h" style="color:var(--muted);margin:0 0 14px">Wrote '+(d.written||[]).length+' file(s) to branch <strong>'+esc(d.branch)+'</strong> on '+esc(L.slug)+'.</p><div class="modal-foot" style="justify-content:flex-end;gap:8px"><a class="btn sm" href="'+esc(d.compare_url)+'" target="_blank" rel="noopener">Open pull request</a><button class="btn ghost sm" id="m-ok">Close</button></div>');
    const wo=$('scrim').classList.contains('open'); $('scrim').classList.add('open'); afterModalOpen(wo); $('m-ok').onclick=()=>closeModal();
  }catch(e){ uiInfo({title:'Push failed', body:'Could not reach the backend.'}); }
}

// ===== Onboarding wizard (first-run; re-runnable from Settings) =====
const WIZ_PROMPT = "I'm setting up a new AI workspace called Marshal and want to bring over what you already know about me. Summarise, as concise markdown bullets: who I am and my role; my domains and expertise; how I like to communicate and receive answers; the projects and topics I'm working on; the tools and stacks I use; and any standing preferences I've given you. Be specific and factual; omit anything you're unsure about.";
const WIZ_N = 5;
// The diagonal is a real transparent cut (SVG mask), not a coloured line, so the mark
// sits cleanly on any background — rail, chat, planner — instead of only on --elevated.
function WMARK(){ const g='wmg'+uid(), m='wmm'+uid(); return '<svg viewBox="0 0 120 120"><defs><linearGradient id="'+g+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--logo-1)"/><stop offset="0.5" stop-color="var(--logo-2)"/><stop offset="1" stop-color="var(--logo-3)"/></linearGradient><mask id="'+m+'"><rect width="120" height="120" fill="black"/><path d="M26 94 L26 32 L60 60 L94 32 L94 94" fill="none" stroke="white" stroke-width="17" stroke-linejoin="round" stroke-linecap="round"/><line x1="98" y1="26" x2="28" y2="100" stroke="black" stroke-width="27" stroke-linecap="round"/></mask></defs><rect width="120" height="120" fill="url(#'+g+')" mask="url(#'+m+')"/><polygon points="93.28,21.54 102.72,30.46 32.72,104.46 23.28,95.54" fill="url(#'+g+')"/></svg>'; }
let wizStep = 0, wizSources = [];
function wizSteps(){ let s=''; for(let i=0;i<WIZ_N;i++) s+=`<span class="${i<wizStep?'done':(i===wizStep?'cur':'')}"></span>`; return `<div class="steps">${s}</div>`; }
function wizFoot(){ return `<div class="wiz-foot"><button class="btn ghost sm" data-w="back">Back</button><div class="right"><button class="wiz-skip" data-w="skip">Skip</button><button class="btn" data-w="next">Continue</button></div></div>`; }
function openWizard(){ wizStep=0; wizSources=[]; overlayCapture(); $('wizard').classList.add('open'); renderWizard(); }
function closeWizard(done){ $('wizard').classList.remove('open'); overlayRestore(); if(done && !store.onboarded){ store.onboarded=true; save('marshal-onboarded',true); } }
function wizSaveStep(){ const r=$('wiz-repo'); if(r){ store.repo=r.value.trim(); save('marshal-repo',store.repo); } }
function wizGo(d){ wizSaveStep(); const n=wizStep+d; if(n<0) return; if(n>=WIZ_N){ closeWizard(true); render(); toast('Welcome to Marshal.'); return; } wizStep=n; renderWizard(); }
function renderWizard(){
  const w=$('wizard'); let b='';
  if(wizStep===0){
    b=`<h3 class="wt">Welcome to Marshal</h3><p class="wd">A self-governing multi-agent assistant that runs on your machine. You set a goal, Marshal's agents reason it out and fill your board, and it learns how you like to work as you go.</p>
      <div style="display:flex;flex-direction:column;gap:11px">
        <div class="wiz-feature">${I.board}A kanban board your agents populate and work</div>
        <div class="wiz-feature">${I.chat}A grounded chat that cites its sources</div>
        <div class="wiz-feature">${I.layers}Runs on Microsoft Foundry, with the live model shown</div></div>
      <div class="wiz-foot"><button class="wiz-skip" data-w="skipall">Skip setup</button><div class="right"><button class="btn" data-w="next">Get started</button></div></div>`;
  } else if(wizStep===1){
    b=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="display:grid;place-items:center;color:var(--ink);width:24px;height:24px">${I.layers}</span><h3 class="wt" style="margin:0">Microsoft Foundry</h3></div>
      <p class="wd">Marshal's reasoning runs on <strong>your</strong> Foundry project. Sign in with <code>az login</code>, deploy a model in the portal, then paste your endpoint below. Your <strong>model library populates automatically</strong> from whatever you have deployed there, no hardcoded list, and you can assign one per agent role in Settings.</p>
      <div style="display:flex;gap:8px;margin-bottom:6px"><input id="wiz-ep" type="text" placeholder="https://<resource>.services.ai.azure.com/api/projects/<project>" value="${esc((fcfg&&fcfg.project_endpoint)||'')}" style="flex:1"><button class="btn ghost sm" id="wiz-connect">Connect</button></div>
      <div class="muted" style="font-size:12px;margin-bottom:12px">Status: <span id="wiz-fstatus">${foundryStatusHTML()}</span></div>
      <div class="muted" style="font-size:12px;border-top:1px solid var(--line);padding-top:10px"><strong>Prefer local?</strong> Marshal also detects <strong>Ollama</strong> models on <code>localhost:11434</code> (run <code>ollama pull llama3.1</code>); they appear next to Foundry in Models. Foundry stays the primary backend.</div>
      ${wizFoot()}`;
  } else if(wizStep===2){
    b=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="display:grid;place-items:center;color:var(--ink);width:24px;height:24px">${I.github}</span><h3 class="wt" style="margin:0">Connect GitHub</h3></div>
      <p class="wd">Connect a fine-grained token so Marshal can <strong>pull</strong> your repos and files in, and <strong>push</strong> changes back as a ready-to-merge branch. The token stays on the local server, never shown to the browser or committed.</p>
      <div style="display:flex;gap:8px;margin-bottom:6px"><input id="wiz-pat" type="password" placeholder="github_pat_…  (Contents: Read and write)" style="flex:1"><button class="btn ghost sm" id="wiz-pat-go">Connect</button></div>
      <div class="muted" style="font-size:12px;margin-bottom:12px">Status: <span id="wiz-ghstatus">${(ghState&&ghState.connected)?("connected as "+esc(ghState.login||"")):"not connected"}</span></div>
      <div style="display:flex;gap:8px;margin-bottom:8px"><input id="wiz-repo" type="text" placeholder="owner / repo  (optional default)" value="${esc(store.repo||'')}" style="flex:1"><button class="btn ghost sm" id="wiz-repo-save">Link repo</button></div>
      ${wizFoot()}`;
  } else if(wizStep===3){
    const chips=wizSources.map(s=>`<span class="wiz-chip">${I.check}${esc(s)}</span>`).join('');
    b=`<h3 class="wt">Bring your context</h3><p class="wd">Paste this into any AI you already use, then paste its reply back. Do it for as many as you like, the more the better.</p>
      <div class="wiz-prompt"><button class="btn ghost sm" id="wiz-copy" style="position:absolute;top:9px;right:9px;padding:4px 9px;font-size:11.5px">Copy</button><div style="max-width:86%">${esc(WIZ_PROMPT)}</div></div>
      <div style="display:flex;gap:8px;margin-bottom:8px"><select id="wiz-src"><option>ChatGPT</option><option>Claude</option><option>Gemini</option><option>Copilot</option><option>Other</option></select><span class="muted" style="font-size:12px;align-self:center">Label where this came from</span></div>
      <textarea id="wiz-ctx" placeholder="Paste your AI's reply here…" style="width:100%;min-height:72px"></textarea>
      <div style="display:flex;justify-content:flex-end;margin:10px 0 12px"><button class="btn ghost sm" id="wiz-add">${I.plus} Add to my profile</button></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${chips}</div>
      ${wizFoot()}`;
  } else {
    b=`<h3 class="wt">You're all set</h3><p class="wd">Marshal is ready. Here's what we set up:</p>
      <div style="display:flex;flex-direction:column;gap:9px">
        ${store.repo?`<div class="wiz-feature">${I.check}Repo: <strong style="margin-left:4px">${esc(store.repo)}</strong></div>`:`<div class="wiz-feature" style="color:var(--muted)">${I.github}No repo linked yet. Add one any time from GitHub.</div>`}
        ${wizSources.length?`<div class="wiz-feature">${I.check}Context from <strong style="margin:0 4px">${wizSources.length}</strong> source(s)</div>`:`<div class="wiz-feature" style="color:var(--muted)">${I.spark}No context added. You can do this later from Settings.</div>`}
        <div class="wiz-feature">${I.check}Running locally on your machine</div>
      </div>
      <div class="wiz-foot"><button class="btn ghost sm" data-w="back">Back</button><div class="right"><button class="btn" data-w="finish">Enter Marshal</button></div></div>`;
  }
  w.innerHTML=`<div class="wiz-card"><div class="wiz-head"><div class="brandrow">${WMARK()}<span>SET UP MARSHAL</span></div>${wizSteps()}</div>${b}</div>`;
  w.querySelectorAll('[data-w]').forEach(btn=> btn.onclick=()=>{ const a=btn.dataset.w; if(a==='next'||a==='skip') wizGo(1); else if(a==='back') wizGo(-1); else if(a==='finish'){ wizSaveStep(); closeWizard(true); render(); toast('Welcome to Marshal.'); } else if(a==='skipall'){ closeWizard(true); render(); toast('Setup skipped. Run it again any time from Settings.'); } });
  const rs=$('wiz-repo-save'); if(rs) rs.onclick=()=>{ store.repo=$('wiz-repo').value.trim(); save('marshal-repo',store.repo); toast(store.repo?('Linked '+store.repo):'Repo cleared.'); };
  const cp=$('wiz-copy'); if(cp) cp.onclick=()=>{ try{ navigator.clipboard.writeText(WIZ_PROMPT); }catch(e){} cp.textContent='Copied'; setTimeout(()=>{cp.textContent='Copy';},1200); };
  const add=$('wiz-add'); if(add) add.onclick=()=>{ const src=$('wiz-src').value, txt=$('wiz-ctx').value.trim(); if(!txt){ toast("Paste your AI's reply first."); return; } store.profileNotes=((store.profileNotes?store.profileNotes.trim()+'\n\n':'')+'## From '+src+'\n'+txt).slice(0,8000); save('marshal-notes',store.profileNotes); if(!wizSources.includes(src)) wizSources.push(src); renderWizard(); toast('Added context from '+src+'.'); };
  const wc=$('wiz-connect'); if(wc) wc.onclick=async()=>{ const ep=($('wiz-ep').value||'').trim(); if(!ep){ toast('Paste your project endpoint.'); return; } const ss=$('wiz-fstatus'); if(ss) ss.textContent='connecting…'; wc.disabled=true; try{ const r=await fetch('/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project_endpoint:ep})}); const d=await r.json(); if(d.ok){ fcfg=null; modelData=null; await loadFoundryConfig(true); toast('Foundry connected. '+((d.models||[]).length)+' model(s).'); renderWizard(); } else { if(ss) ss.textContent=(d.error||'failed'); wc.disabled=false; } }catch(e){ if(ss) ss.textContent='backend unreachable'; wc.disabled=false; } };
  const pg=$('wiz-pat-go'); if(pg) pg.onclick=async()=>{ const tok=($('wiz-pat').value||'').trim(); if(!tok){ toast('Paste a token.'); return; } const ss=$('wiz-ghstatus'); if(ss) ss.textContent='connecting…'; pg.disabled=true; try{ const r=await fetch('/github/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tok})}); const d=await r.json(); if(d.ok){ ghState=null; await loadGithubStatus(true); toast('GitHub connected as '+(d.login||'')); renderWizard(); } else { if(ss) ss.textContent=(d.error||'failed'); pg.disabled=false; } }catch(e){ if(ss) ss.textContent='backend unreachable'; pg.disabled=false; } };
  keepFocusIn($('wizard'));
}

// ===== Step-by-step planner (Marshal proposes one step; you add / edit / skip) =====
let planProject=null, planGoal='', planSteps=[], planBatch=[], planFocus='', planBusy=false, planErr='';
function openPlan(p){ planProject=p; planGoal=(p.desc||p.name||'').trim(); planSteps=[]; planBatch=[]; planFocus=''; planErr=''; overlayCapture(); $('plan').classList.add('open'); renderPlan(); planBatchRun(); }
function closePlan(){ $('plan').classList.remove('open'); overlayRestore(); }

// ===== Reasoning trace (live timeline of the streamed run) + run report export =====
function openTrace(){ overlayCapture(); $('trace').classList.add('open'); renderTrace(); }
function closeTrace(){ $('trace').classList.remove('open'); overlayRestore(); }
function renderTrace(){
  const w=$('trace'); if(!w) return;
  const head = runMeta.goal ? `<div class="muted" style="font-size:12px;margin-bottom:14px;line-height:1.5">Goal: ${esc(runMeta.goal)}${runMeta.spend!=null?(' · spent $'+runMeta.spend+(runMeta.charges!=null?(' · '+runMeta.charges+' calls'):'')):''}</div>` : '';
  const rows = runTrace.length ? runTrace.map(e=>`<div class="trace-row trace-${e.type}"><span class="trace-t">+${e.t}s</span><span class="trace-l">${esc(e.label)}</span></div>`).join('') : '<div class="muted" style="font-size:13px">No run yet. Hit Run Marshal and the reasoning will stream here, step by step.</div>';
  w.innerHTML=`<div class="trace-back" data-tr="close"></div><div class="trace-draw">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><span class="pmark">${WMARK()}</span><span style="font-size:15px;font-weight:650;color:var(--ink)">Reasoning trace</span><span style="flex:1"></span>${(runTrace.length&&runMeta.answer!=null)?'<button class="btn ghost sm" data-tr="export">Export report</button>':''}<button class="iconbtn" data-tr="close" title="Close">✕</button></div>
    ${head}<div class="trace-list">${rows}</div></div>`;
  w.querySelectorAll('[data-tr]').forEach(b=> b.onclick=()=>{ const a=b.dataset.tr; if(a==='close') closeTrace(); else if(a==='export') exportRunReport(); });
  if(agentsRunning){ const dr=w.querySelector('.trace-draw'); if(dr) dr.scrollTop=dr.scrollHeight; }   // follow the live stream
  keepFocusIn($('trace'));
}
function exportRunReport(){
  const m=runMeta; const lines=['# Marshal run report\n'];
  if(m.project) lines.push('- Project: '+m.project);
  if(m.goal) lines.push('- Goal: '+m.goal);
  lines.push('- Grounding: '+(m.source||'project'));
  if(m.spend!=null) lines.push('- Spend: $'+m.spend+(m.budgetUsd!=null?(' of $'+m.budgetUsd):'')+(m.charges!=null?(' · '+m.charges+' model calls'):''));
  lines.push('\n## Reasoning trace\n');
  (runTrace||[]).forEach(e=> lines.push('- +'+e.t+'s  '+e.label));
  if(m.answer){ lines.push('\n## Answer\n', m.answer); }
  if(m.citations && m.citations.length){ lines.push('\n## Sources\n'); m.citations.forEach((c,i)=> lines.push('['+(i+1)+'] '+(c.source||'source')+(c.text?(': '+c.text):''))); }
  const md=lines.join('\n')+'\n';
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'})); a.download='marshal-run-report.md';
  document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },0);
  toast('Run report downloaded.');
}
// Fetch a fresh importance-ordered batch from /plan-all. `focus` (optional) steers it.
async function planBatchRun(focus){
  if(planBusy) return;
  planBusy=true; planErr=''; planBatch=[]; renderPlan();
  const body={ goal:planGoal, steps:planSteps, project:{name:planProject.name,desc:planProject.desc} };
  if(focus){ body.focus=focus; planFocus=focus; }
  try{
    const res=await fetch('/plan-all',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(data.error){ planErr=data.error; }
    planBatch=(data.steps||[]).map(s=>({title:s.title, detail:s.detail||''}));
    if(!planErr && !planBatch.length) planErr='Marshal proposed no further cards.';
  }catch(e){ planErr='Could not reach the planner.'; }
  planBusy=false; renderPlan();
}
function addBatchCard(i){
  const s=planBatch[i]; if(!s) return;
  planProject.tasks.push({id:uid(), title:s.title, notes:s.detail||'', assignee:'Orchestrator', col:'todo'});
  planSteps.push({title:s.title, detail:s.detail||''});
  planBatch.splice(i,1);
  persist(); if(store.view==='kanban' && store.current===planProject.id) render();
  toast('Added "'+s.title+'" to the board.');
  renderPlan();
}
function addBatchAll(){
  if(!planBatch.length) return;
  const n=planBatch.length;
  planBatch.forEach(s=>{ planProject.tasks.push({id:uid(), title:s.title, notes:s.detail||'', assignee:'Orchestrator', col:'todo'}); planSteps.push({title:s.title, detail:s.detail||''}); });
  planBatch=[];
  persist(); if(store.view==='kanban' && store.current===planProject.id) render();
  toast(n+' card(s) added to the board.');
  renderPlan();
}
function renderPlan(){
  const w=$('plan'); if(!w) return;
  const doneList = planSteps.map(s=>`<div class="plan-step-done"><span class="pchk">${I.check}</span><span style="color:var(--ink)">${esc(s.title)}</span></div>`).join('');
  let batch='';
  if(planBusy){
    batch=`<div class="muted" style="font-size:13px;padding:6px 0">Marshal is drawing up the plan…</div>`;
  } else if(planErr){
    batch=`<div class="plan-prop" style="background:color-mix(in srgb,var(--done) 12%,transparent);border-color:var(--line)"><div class="muted" style="font-size:12.5px">${esc(planErr)}</div></div>`;
  } else if(planBatch.length){
    batch=planBatch.map((s,i)=>`<div class="plan-card">
        <div class="plan-rank">${i+1}</div>
        <div class="plan-card-body"><div class="plan-card-t">${esc(s.title)}</div>${s.detail?`<div class="plan-card-d">${esc(s.detail)}</div>`:''}</div>
        <button class="btn ghost sm plan-add" data-p="addone" data-i="${i}" title="Add to board">${I.plus}</button>
      </div>`).join('');
  } else {
    batch=`<div class="muted" style="font-size:12.5px;padding:4px 0">No cards in the batch. Steer Marshal below, or re-plan.</div>`;
  }
  const canAddAll = !planBusy && planBatch.length>0;
  w.innerHTML=`<div class="plan-back" data-p="close"></div><div class="plan-draw">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><span class="pmark">${WMARK()}</span><span style="font-size:15px;font-weight:650;color:var(--ink)">Plan with Marshal</span><span style="flex:1"></span><button class="iconbtn" data-p="close" title="Close">✕</button></div>
    <label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Goal</label>
    <input id="plan-goal" type="text" value="${esc(planGoal)}" style="width:100%;margin:5px 0 16px">
    <label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Steer (optional)</label>
    <div style="display:flex;gap:8px;margin:5px 0 16px">
      <input id="plan-focus" type="text" value="${esc(planFocus)}" placeholder="e.g. focus on tests and CI, or ship an MVP first" style="flex:1" ${planBusy?'disabled':''}>
      <button class="btn sm" data-p="steer" ${planBusy?'disabled':''}>${I.spark} Steer</button>
    </div>
    ${doneList?`<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px">Added to board</div>${doneList}<div style="height:14px"></div>`:''}
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px">
      <span style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px">${planFocus?'Marshal suggests (steered)':'Marshal suggests'}</span>
      <span style="flex:1"></span>
      ${canAddAll?`<button class="btn ghost sm" data-p="all">${I.spark} Add all</button>`:''}
    </div>
    <div class="plan-batch">${batch}</div>
    <span style="flex:1"></span>
    <div style="display:flex;justify-content:space-between;gap:8px;border-top:1px solid var(--line);padding-top:14px;margin-top:16px">
      <button class="btn ghost sm" data-p="replan" ${planBusy?'disabled':''}>Re-plan</button>
      <button class="btn ghost sm" data-p="close">Close</button>
    </div>
  </div>`;
  w.querySelectorAll('[data-p]').forEach(b=> b.onclick=()=>{
    const a=b.dataset.p;
    if(a==='close') closePlan();
    else if(a==='addone') addBatchCard(parseInt(b.dataset.i,10));
    else if(a==='all') addBatchAll();
    else if(a==='steer'){ planGoal=($('plan-goal').value||planGoal||'').trim(); const f=($('plan-focus').value||'').trim(); if(!f){ toast('Type a direction to steer towards.'); return; } planBatchRun(f); }
    else if(a==='replan'){ planGoal=($('plan-goal').value||'').trim(); planFocus=''; const ff=$('plan-focus'); if(ff) ff.value=''; planBatchRun(); }
  });
  const fb=$('plan-focus'); if(fb) fb.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ ev.preventDefault(); planGoal=($('plan-goal').value||planGoal||'').trim(); const f=fb.value.trim(); if(f) planBatchRun(f); } });
  const g=$('plan-goal'); if(g) g.onchange=()=>{ planGoal=g.value.trim(); };
  keepFocusIn($('plan'));
}

// ===== Boot =====
// Cursor spotlight: track the mouse over cards for the radial highlight.
document.addEventListener('mousemove', e=>{
  const el = e.target.closest ? e.target.closest('.pcard,.kcard,.mcard') : null;
  if(!el) return;
  const r = el.getBoundingClientRect();
  el.style.setProperty('--mx', (e.clientX - r.left)+'px');
  el.style.setProperty('--my', (e.clientY - r.top)+'px');
}, {passive:true});
applyTheme(store.theme);
render();
// Pick up server config (e.g. whether Foundry IQ is set up) and re-render the affected views.
loadConfig().then(()=>{ if(store.view==='chat') render(); });
// Load real model data so the board can stamp cards with the model actually in use.
loadModels().then(()=>{ if(store.view==='models') render(); });
loadGithubStatus();   // so a connected GitHub repo enables "Push to GitHub" on cards
if(!store.onboarded) openWizard();
</script>
