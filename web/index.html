<style>
  /* ===== Theme palettes ===== */
  :root[data-theme="dark-purple"]{
    --bg:#000000; --surface:#0a0a0d; --surface2:#111016; --elevated:#16141d; --line:#241f31;
    --ink:#f3eefb; --muted:#988aae; --accent:#a855f7; --accent2:#c79bff; --accent-soft:rgba(168,85,247,.16);
    --on-accent:#15071f; --rail:#070709; --logo-1:#d6c2ff; --logo-2:#a855f7; --logo-3:#7c3aed;
    --todo:#8b8b96; --doing:#a855f7; --review:#f0a93b; --done:#3fce7e;
  }
  :root[data-theme="light-purple"]{
    --bg:#f6f3fc; --surface:#ffffff; --surface2:#f3eefe; --elevated:#ffffff; --line:#e6ddf6;
    --ink:#1c1330; --muted:#6c5f86; --accent:#7c3aed; --accent2:#9d5cf0; --accent-soft:rgba(124,58,237,.12);
    --on-accent:#ffffff; --rail:#1a1426; --logo-1:#ecdcff; --logo-2:#c4a5fc; --logo-3:#9d5cf0;
    --todo:#5c5c66; --doing:#5b21b6; --review:#8a4e09; --done:#0e7a3d;
  }
  :root[data-theme="midnight"]{
    --bg:#07060f; --surface:#100e1f; --surface2:#16142b; --elevated:#1b1838; --line:#272448;
    --ink:#e8e7f6; --muted:#9893c2; --accent:#7c6cff; --accent2:#a99bff; --accent-soft:rgba(124,108,255,.16);
    --on-accent:#0a0820; --rail:#05040c; --logo-1:#cfc6ff; --logo-2:#8c7cff; --logo-3:#6757e8;
    --todo:#8a86a8; --doing:#7c6cff; --review:#f0a93b; --done:#3fce7e;
  }
  :root[data-theme="neon"]{
    --bg:#0a0a0c; --surface:#141016; --surface2:#1b121e; --elevated:#211522; --line:#311f33;
    --ink:#f6eef6; --muted:#b58fb5; --accent:#d946ef; --accent2:#a855f7; --accent-soft:rgba(217,70,239,.16);
    --on-accent:#1b0820; --rail:#070507; --logo-1:#f5b8ff; --logo-2:#e25cf5; --logo-3:#b81fda;
    --todo:#9b8b9b; --doing:#d946ef; --review:#f0a93b; --done:#3fce7e;
  }
  :root[data-theme="mono"]{
    --bg:#0c0c0d; --surface:#161618; --surface2:#1d1d20; --elevated:#222226; --line:#2c2c30;
    --ink:#ededf0; --muted:#9a9aa0; --accent:#cbcbd2; --accent2:#e8e8ee; --accent-soft:rgba(203,203,210,.12);
    --on-accent:#141416; --rail:#070708; --logo-1:#fafafe; --logo-2:#cfcfd6; --logo-3:#8f8f97;
    --todo:#8b8b90; --doing:#cbcbd2; --review:#f0a93b; --done:#3fce7e;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 -apple-system,"Segoe UI",Roboto,sans-serif; transition:background .25s,color .25s;}
  .app{display:flex; height:100vh; overflow:hidden;}
  button{font:inherit; cursor:pointer;}
  ::-webkit-scrollbar{width:10px;height:10px;} ::-webkit-scrollbar-thumb{background:var(--line); border-radius:99px;}

  /* ===== Rail ===== */
  .rail{width:64px; flex:0 0 64px; background:var(--rail); border-right:1px solid var(--line); display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:6px;}
  .rail .logo{width:40px;height:40px;display:grid;place-items:center;margin-bottom:6px;}
  .rail .logo img{width:100%;height:100%;object-fit:contain;}
  .rail .logo svg{width:36px;height:36px;display:block;}
  .rbtn{width:42px;height:42px;border:0;background:transparent;color:var(--muted);border-radius:12px;display:grid;place-items:center;position:relative;transition:.15s;}
  .rbtn svg{width:21px;height:21px;}
  .rbtn:hover{background:var(--accent-soft);color:var(--ink);}
  .rbtn.active{background:var(--accent-soft);color:var(--accent);}
  .rbtn.active::before{content:"";position:absolute;left:-12px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--accent);}
  .rail .sep{width:28px;height:1px;background:var(--line);margin:6px 0;}
  .rail .spacer{flex:1;}
  .pin{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--surface2);color:var(--ink);display:grid;place-items:center;font-weight:700;font-size:14px;transition:.15s;}
  .pin:hover{border-color:var(--accent);}
  .tip{position:absolute;left:54px;white-space:nowrap;background:var(--elevated);border:1px solid var(--line);color:var(--ink);padding:5px 9px;border-radius:8px;font-size:12px;opacity:0;pointer-events:none;transform:translateX(-4px);transition:.12s;z-index:50;}
  .rbtn:hover .tip,.pin:hover .tip{opacity:1;transform:translateX(0);}

  /* ===== Main ===== */
  .main{flex:1; display:flex; flex-direction:column; min-width:0;}
  .topbar{height:58px;flex:0 0 58px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:12px;background:var(--surface);}
  .topbar h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px;}
  .topbar .crumb{color:var(--muted);font-weight:400;}
  .view{flex:1;overflow:auto;padding:28px 32px;}

  .btn{background:var(--accent);color:var(--on-accent);border:0;border-radius:9px;padding:9px 14px;font-weight:650;display:inline-flex;align-items:center;gap:7px;text-decoration:none;}
  a.btn svg,.btn svg{width:15px;height:15px;}
  .btn svg{width:16px;height:16px;}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent);}
  .btn.sm{padding:6px 10px;font-size:13px;}

  /* ===== Dashboard ===== */
  .hello{font-size:22px;font-weight:700;margin:0 0 2px;}
  .sub{color:var(--muted);margin:0 0 22px;}
  .section-h{display:flex;align-items:center;justify-content:space-between;margin:30px 0 14px;}
  .section-h h2{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:0;}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 17px;}
  .stat .n{font-size:25px;font-weight:700;line-height:1;}
  .stat .l{color:var(--muted);font-size:11.5px;margin-top:8px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px;}
  .stat .d{width:7px;height:7px;border-radius:2px;flex:0 0 auto;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;}
  .pcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;transition:.15s;}
  .pcard:hover{border-color:var(--accent);transform:translateY(-1px);}
  .pcard .ptop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .pcard h3{margin:0;font-size:16px;}
  .pcard .pdesc{color:var(--muted);font-size:13px;margin:6px 0 14px;min-height:18px;}
  .bar{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;border:1px solid var(--line);}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .pmeta{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .avatars{display:flex;}
  .av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;border:2px solid var(--surface);margin-left:-7px;}
  .av:first-child{margin-left:0;}
  .av.ai{outline:2px solid var(--accent);outline-offset:-2px;}
  .iconbtn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;width:30px;height:30px;display:grid;place-items:center;}
  .iconbtn:hover{color:var(--accent);border-color:var(--accent);}
  .iconbtn.on{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}
  .iconbtn svg{width:15px;height:15px;}
  .people{display:flex;gap:10px;flex-wrap:wrap;}
  .person{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:6px 13px 6px 6px;font-size:13px;}
  .dot-on{width:8px;height:8px;border-radius:50%;background:var(--done);}
  .empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:52px 24px;color:var(--muted);border:1px dashed var(--line);border-radius:14px;background:var(--surface);}
  .empty .eicon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);margin-bottom:2px;}
  .empty .eicon svg{width:22px;height:22px;}
  .empty h3{margin:4px 0 0;font-size:16px;color:var(--ink);}
  .empty p{margin:0;max-width:360px;font-size:13px;line-height:1.6;}
  .empty .btn{margin-top:10px;}

  /* ===== Kanban ===== */
  .board{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:8px;}
  .col{flex:0 0 280px;background:var(--surface);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;max-height:calc(100vh - 150px);}
  .col.over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
  .col-h{display:flex;align-items:center;gap:8px;padding:13px 14px;border-bottom:1px solid var(--line);}
  .col-h .swatch{width:9px;height:9px;border-radius:3px;}
  .col-h .name{font-weight:650;font-size:13px;text-transform:uppercase;letter-spacing:.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .col-h .count{margin-left:auto;color:var(--muted);font-size:12px;background:var(--surface2);border-radius:99px;padding:1px 8px;}
  .col-body{padding:10px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;}
  .col-empty{border:1px dashed var(--line);border-radius:9px;padding:14px;text-align:center;color:var(--muted);font-size:12.5px;}
  .kcard{background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:grab;transition:.12s;}
  .kcard:hover{border-color:var(--accent);}
  .kcard.dragging{opacity:.4;}
  .kcard .kt{font-weight:600;margin-bottom:6px;}
  .kcard .kn{color:var(--muted);font-size:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .kcard .kfoot{display:flex;align-items:center;justify-content:space-between;margin-top:9px;}
  .tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 8px;border-radius:99px;}
  .add-card{margin:2px 10px 12px;color:var(--muted);background:transparent;border:1px dashed var(--line);border-radius:9px;padding:8px;width:calc(100% - 20px);text-align:left;}
  .col-h .col-del{width:22px;height:22px;border:0;background:transparent;color:var(--muted);font-size:11px;opacity:0;transition:opacity .15s ease;flex:0 0 auto;}
  .col:hover .col-h .col-del{opacity:.65;}
  .col-h .col-del:hover{opacity:1;color:var(--ink);}
  .col-add{flex:0 0 210px;align-self:stretch;min-height:64px;background:transparent;border:1px dashed var(--line);border-radius:14px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:border-color .15s ease,color .15s ease;}
  .col-add:hover{color:var(--ink);border-color:var(--accent);}
  .add-card:hover{color:var(--accent);border-color:var(--accent);}
  .kfiles{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:11.5px;margin-top:7px;font-family:ui-monospace,Menlo,Consolas,monospace;}
  .kfiles svg{width:13px;height:13px;flex:0 0 auto;}
  .kfiles span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .filelist{display:flex;flex-direction:column;gap:6px;}
  .cites{margin-top:12px;border:1px solid var(--line);border-radius:10px;background:var(--surface2);overflow:hidden;}
  .cites>summary{cursor:pointer;list-style:none;padding:9px 12px;font-size:12px;color:var(--muted);user-select:none;}
  .cites>summary::-webkit-details-marker{display:none;}
  .cites>summary::before{content:'▸';margin-right:7px;color:var(--accent);font-size:10px;}
  .cites[open]>summary::before{content:'▾';}
  .citelist{display:flex;flex-direction:column;gap:1px;border-top:1px solid var(--line);}
  .citeitem{display:flex;gap:9px;padding:9px 12px;font-size:12px;border-top:1px solid color-mix(in srgb,var(--line) 55%,transparent);}
  .citeitem:first-child{border-top:none;}
  .citen{color:var(--accent);font-weight:600;flex:0 0 auto;}
  .citebody{min-width:0;}
  .citesrc{color:var(--ink);font-weight:600;font-size:11.5px;margin-bottom:2px;}
  .citetext{color:var(--muted);line-height:1.5;}
  .citetag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);border-radius:5px;padding:1px 6px;margin-right:7px;vertical-align:middle;}
  .citeitem.clickable{cursor:pointer;}
  .citeitem.clickable:hover{background:var(--surface);}
  .citego{color:var(--accent);font-size:11px;margin-left:7px;opacity:0;transition:opacity .15s ease;}
  .citeitem.clickable:hover .citego{opacity:1;}
  .msg .cites{max-width:100%;}
  .ground-pick{display:flex;align-items:center;gap:6px;}
  .ground-pick svg{width:14px;height:14px;color:var(--muted);}
  .ground-pick select{padding:4px 8px;font-size:12px;border-radius:8px;}
  .fileitem{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:6px 9px;}
  .fileitem svg{width:15px;height:15px;color:var(--muted);flex:0 0 auto;}
  .fileitem .fpath{flex:1;min-width:0;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fileitem .fnote{flex:0 1 auto;font-size:11.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
  .fileitem .fdel{width:24px;height:24px;border:0;}
  .fileitem .fopen{flex:1;min-width:0;text-align:left;background:transparent;border:0;color:var(--ink);cursor:pointer;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0;}
  .fileitem .fopen:hover{color:var(--accent);text-decoration:underline;}
  .code-edit{width:100%;min-height:52vh;resize:vertical;background:var(--surface2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:13px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;line-height:1.55;tab-size:2;}

  /* ===== Settings ===== */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;max-width:640px;}
  .panel h2{margin:0 0 4px;font-size:15px;}
  .panel p.h{color:var(--muted);margin:0 0 14px;font-size:13px;}
  .settings-wrap{max-width:760px;margin:0 auto;}
  .settings-wrap .panel{max-width:none;padding:22px 24px;}
  .settings-wrap input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex:none;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:10px 0;border-top:1px solid var(--line);}
  .row:first-of-type{border-top:0;}
  select,input[type=text],textarea{background:var(--surface2);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 12px;font:inherit;transition:border-color .15s ease;}
  select:hover,input[type=text]:hover,textarea:hover{border-color:color-mix(in srgb, var(--accent) 45%, var(--line));}
  .muted{color:var(--muted);}
  .pill{font-size:11px;color:var(--accent);background:var(--accent-soft);border-radius:99px;padding:2px 9px;}

  /* ===== Brand wordmark ===== */
  .rail .brand{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--muted);margin:-2px 0 8px;text-transform:uppercase;}

  /* ===== Chat ===== */
  .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 112px);width:100%;}
  .chat-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .chat-msgs{flex:1;overflow:auto;display:flex;flex-direction:column;gap:16px;padding:6px 2px;}
  .msg{display:flex;gap:10px;max-width:min(760px,88%);}
  .msg.me{align-self:flex-end;flex-direction:row-reverse;}
  .msg .bubble{padding:10px 13px;border-radius:13px;font-size:14px;line-height:1.55;white-space:pre-wrap;}
  .msg.ai .bubble{background:var(--surface);border:1px solid var(--line);border-top-left-radius:4px;}
  .msg.me .bubble{background:var(--accent);color:var(--on-accent);border-top-right-radius:4px;}
  .msg .who{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;flex:0 0 auto;}
  .msg.ai .who{background:linear-gradient(135deg,var(--logo-2),var(--logo-3));color:#fff;}
  .msg.me .who{background:var(--surface2);color:var(--ink);border:1px solid var(--line);}
  .chat-empty{color:var(--muted);text-align:center;margin:auto;padding:36px;max-width:440px;}
  .chat-logo{width:88px;height:88px;margin:0 auto 18px;animation:mfloat 4.5s ease-in-out infinite;}
  .chat-logo svg{width:100%;height:100%;display:block;filter:drop-shadow(0 8px 22px color-mix(in srgb, var(--accent) 30%, transparent));}
  .chat-input{display:flex;gap:8px;margin-top:12px;}
  .chat-input textarea{flex:1;min-height:44px;max-height:150px;resize:none;background:var(--surface2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;}
  .typing{color:var(--muted);font-size:13px;font-style:italic;}

  /* ===== Model browser & tiers ===== */
  .tierbadge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 8px;border-radius:99px;}
  .tier-high{color:#e0607e;background:rgba(224,96,126,.15);}
  .tier-mid{color:var(--accent);background:var(--accent-soft);}
  .tier-low{color:#3fce7e;background:rgba(63,206,126,.16);}
  .tierlegend{display:flex;gap:18px;flex-wrap:wrap;margin:0 0 18px;color:var(--muted);font-size:12.5px;}
  .tier-h{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:22px 0 12px;display:flex;align-items:center;gap:10px;}
  .mcard{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 16px;}
  .mcard.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
  .mcard .mtop{display:flex;align-items:center;gap:9px;justify-content:space-between;}
  .mcard h3{margin:0;font-size:15px;}
  .mcard .mstat{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin:9px 0 7px;}
  .mcard .mnote{color:var(--muted);font-size:13px;margin-bottom:11px;}
  .mnote code,.row code,.empty code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:var(--surface2);padding:1px 6px;border-radius:5px;color:var(--ink);}
  .mcard .mfoot{display:flex;gap:8px;align-items:center;justify-content:flex-end;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .seg button{background:transparent;color:var(--muted);border:0;padding:6px 12px;font:inherit;font-size:13px;}
  .seg button.on{background:var(--accent-soft);color:var(--accent);}

  /* ===== Polish: microinteractions ===== */
  .btn{transition:box-shadow .2s ease, transform .08s ease, filter .2s ease;}
  .btn:not(.ghost):not(.danger):hover{filter:brightness(1.06);box-shadow:0 6px 22px color-mix(in srgb, var(--accent) 36%, transparent);}
  .btn.ghost:not(.danger):hover{background:var(--accent-soft);}
  .btn:active{transform:translateY(1px);}
  .iconbtn{transition:.15s;}
  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .pcard,.kcard,.mcard{position:relative;}
  .mcard{transition:border-color .15s ease, transform .15s ease;}
  .mcard:hover{border-color:var(--accent);transform:translateY(-1px);}
  .pcard::after,.kcard::after,.mcard::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;opacity:0;transition:opacity .25s ease;background:radial-gradient(180px circle at var(--mx,50%) var(--my,50%), color-mix(in srgb, var(--accent) 15%, transparent), transparent 60%);}
  .pcard:hover::after,.kcard:hover::after,.mcard:hover::after{opacity:1;}
  @keyframes mfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .rail .logo{animation:mfloat 4.5s ease-in-out infinite;}
  @media (prefers-reduced-motion: reduce){ .rail .logo,.chat-logo{animation:none;} .pcard::after,.kcard::after,.mcard::after{transition:none;} .btn{transition:none;} }

  /* ===== Modal ===== */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;}
  .scrim.open{display:flex;}
  .modal{background:var(--elevated);border:1px solid var(--line);border-radius:16px;width:min(520px,92vw);padding:20px;}
  .modal.wide{width:min(900px,95vw);}
  .modal h3{margin:0 0 14px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;}
  .field input,.field textarea,.field select{width:100%;}
  .field textarea{min-height:90px;resize:vertical;}
  .modal-foot{display:flex;justify-content:space-between;margin-top:8px;}
  .btn.danger{background:#e5484d;color:#fff;}
  .btn.ghost.danger{background:transparent;color:#e5484d;border:1px solid #e5484d;}
  .ai-suggest{text-transform:none;letter-spacing:0;padding:4px 9px;font-size:12px;font-weight:600;}
  .ai-suggest svg{width:14px;height:14px;}

  /* ===== Toast ===== */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);background:var(--elevated);border:1px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:10px;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;box-shadow:0 10px 34px rgba(0,0,0,.45);font-size:13px;max-width:80vw;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== Onboarding wizard ===== */
  .wiz{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;z-index:300;padding:20px;}
  .wiz.open{display:flex;}
  .wiz-card{background:var(--elevated);border:1px solid var(--line);border-radius:18px;width:min(560px,94vw);max-height:90vh;overflow:auto;padding:26px 28px;}
  .wiz-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;}
  .wiz-head .brandrow{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);letter-spacing:.5px;}
  .wiz-head .brandrow svg{width:28px;height:28px;}
  .steps{display:flex;gap:6px;align-items:center;}
  .steps span{height:5px;width:6px;border-radius:99px;background:var(--line);transition:.25s ease;}
  .steps span.done{background:var(--accent);}
  .steps span.cur{width:20px;background:var(--accent);}
  .wiz h3.wt{font-size:21px;font-weight:700;margin:0 0 6px;color:var(--ink);}
  .wiz p.wd{color:var(--muted);font-size:13.5px;line-height:1.6;margin:0 0 16px;}
  .wiz-foot{display:flex;align-items:center;justify-content:space-between;margin-top:22px;gap:12px;}
  .wiz-foot .right{display:flex;gap:10px;align-items:center;}
  .wiz-skip{background:transparent;border:0;color:var(--muted);font-size:13px;cursor:pointer;}
  .wiz-skip:hover{color:var(--ink);}
  .wiz-opt{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:13px 14px;cursor:pointer;transition:.15s;color:var(--ink);}
  .wiz-opt:hover{border-color:var(--accent);}
  .wiz-opt.sel{border-color:var(--accent);background:var(--accent-soft);}
  .wiz-feature{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink);}
  .wiz-feature svg{width:18px;height:18px;color:var(--accent);flex:0 0 auto;}
  .wiz-prompt{background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:12px 13px;position:relative;margin-bottom:14px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--ink);line-height:1.6;}
  .wiz-chip{display:inline-flex;align-items:center;gap:6px;background:color-mix(in srgb, var(--done) 16%, transparent);color:var(--done);border-radius:99px;padding:4px 11px;font-size:12px;}
  .wiz-chip svg{width:14px;height:14px;}

  /* ===== Step-by-step planner drawer ===== */
  .plan{position:fixed;inset:0;display:none;z-index:250;}
  .plan.open{display:block;}
  .plan-back{position:absolute;inset:0;background:rgba(0,0,0,.3);}
  .plan-draw{position:absolute;top:0;right:0;height:100%;width:min(400px,92vw);background:var(--surface);border-left:1px solid var(--line);display:flex;flex-direction:column;padding:20px;overflow:auto;box-shadow:-12px 0 40px rgba(0,0,0,.45);}
  .pmark svg{width:24px;height:24px;display:block;}
  .plan-step-done{display:flex;align-items:center;gap:9px;font-size:13px;margin-bottom:7px;}
  .plan-step-done .pchk{width:18px;height:18px;border-radius:50%;background:color-mix(in srgb,var(--done) 16%,transparent);color:var(--done);display:grid;place-items:center;flex:0 0 auto;}
  .plan-step-done .pchk svg{width:12px;height:12px;}
  .plan-prop{background:var(--accent-soft);border:1px solid var(--accent);border-radius:12px;padding:14px;}
  .plan-batch{display:flex;flex-direction:column;gap:9px;}
  .plan-card{display:flex;align-items:flex-start;gap:10px;background:var(--accent-soft);border:1px solid var(--accent);border-radius:12px;padding:11px 12px;}
  .plan-rank{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:color-mix(in srgb,var(--accent) 24%,transparent);color:var(--accent);font-size:11px;font-weight:700;display:grid;place-items:center;margin-top:1px;}
  .plan-card-body{flex:1;min-width:0;}
  .plan-card-t{font-weight:650;color:var(--ink);font-size:13px;line-height:1.35;}
  .plan-card-d{color:var(--muted);font-size:12px;line-height:1.5;margin-top:3px;}
  .plan-card .plan-add{flex:0 0 auto;padding:5px 8px;}
  .plan-card .plan-add svg{width:14px;height:14px;}
  .trace{position:fixed;inset:0;display:none;z-index:250;}
  .trace.open{display:block;}
  .trace-back{position:absolute;inset:0;background:rgba(0,0,0,.3);}
  .trace-draw{position:absolute;top:0;right:0;height:100%;width:min(440px,94vw);background:var(--surface);border-left:1px solid var(--line);display:flex;flex-direction:column;padding:20px;overflow:auto;box-shadow:-12px 0 40px rgba(0,0,0,.45);}
  .trace-list{display:flex;flex-direction:column;}
  .trace-row{display:flex;gap:10px;padding:8px 0 8px 14px;border-left:2px solid var(--line);position:relative;}
  .trace-row::before{content:'';position:absolute;left:-5px;top:13px;width:8px;height:8px;border-radius:50%;background:var(--muted);}
  .trace-row.trace-decomposed::before,.trace-row.trace-synthesise_start::before{background:var(--accent);}
  .trace-row.trace-graded::before{background:var(--review);}
  .trace-row.trace-done::before{background:var(--done);}
  .trace-row.trace-error::before,.trace-row.trace-refused::before{background:#e0607e;}
  .trace-t{color:var(--muted);font-size:11px;font-family:ui-monospace,Menlo,Consolas,monospace;flex:0 0 48px;padding-top:1px;}
  .trace-l{color:var(--ink);font-size:12.5px;line-height:1.5;}
  .citetext{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:default;}
  .citeitem:hover .citetext,.citetext:hover{-webkit-line-clamp:unset;}
</style>
</head>
<body>
<div class="app">
  <nav class="rail">
    <div class="logo" title="Marshal"><svg viewBox="0 0 120 120" role="img" aria-label="Marshal"><defs><linearGradient id="mGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--logo-1)"/><stop offset="0.5" stop-color="var(--logo-2)"/><stop offset="1" stop-color="var(--logo-3)"/></linearGradient></defs><path d="M26 94 L26 32 L60 60 L94 32 L94 94" fill="none" stroke="url(#mGrad)" stroke-width="17" stroke-linejoin="round" stroke-linecap="round"/><line x1="98" y1="26" x2="28" y2="100" stroke="var(--rail)" stroke-width="27" stroke-linecap="round"/><polygon points="93.28,21.54 102.72,30.46 32.72,104.46 23.28,95.54" fill="url(#mGrad)"/></svg></div>
    <div class="brand">Marshal</div>
    <button class="rbtn" data-nav="dashboard" title="Dashboard">__I_home__<span class="tip">Dashboard</span></button>
    <button class="rbtn" data-nav="chat" title="Chat">__I_chat__<span class="tip">Chat</span></button>
    <button class="rbtn" data-nav="projects" title="Projects">__I_folder__<span class="tip">Projects</span></button>
    <button class="rbtn" data-nav="models" title="Models">__I_layers__<span class="tip">Models</span></button>
    <button class="rbtn" data-nav="github" title="GitHub">__I_github__<span class="tip">GitHub</span></button>

    <button class="rbtn" data-nav="settings" title="Settings">__I_gear__<span class="tip">Settings</span></button>
  </nav>

  <main class="main">
    <div class="topbar">
      <h1 id="title">Dashboard</h1>
      <div id="actions"></div>
    </div>

  </main>
</div>

<div class="scrim" id="scrim"><div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Dialog"></div></div>
<div class="wiz" id="wizard" role="dialog" aria-modal="true" aria-label="Set up Marshal"></div>
<div class="plan" id="plan" role="dialog" aria-modal="true" aria-label="Plan with Marshal"></div>
<div class="trace" id="trace" role="dialog" aria-modal="true" aria-label="Reasoning trace"></div>

<script>
// ===== Icons =====
const I = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>',
  folder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
  board:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16M15 4v16"/></svg>',
  gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M10.05 6.01 L10.28 3.17 L13.72 3.17 L13.95 6.01 L14.86 6.39 L17.03 4.54 L19.46 6.97 L17.61 9.14 L17.99 10.05 L20.83 10.28 L20.83 13.72 L17.99 13.95 L17.61 14.86 L19.46 17.03 L17.03 19.46 L14.86 17.61 L13.95 17.99 L13.72 20.83 L10.28 20.83 L10.05 17.99 L9.14 17.61 L6.97 19.46 L4.54 17.03 L6.39 14.86 L6.01 13.95 L3.17 13.72 L3.17 10.28 L6.01 10.05 L6.39 9.14 L4.54 6.97 L6.97 4.54 L9.14 6.39 Z"/><circle cx="12" cy="12" r="3.1"/></svg>',
  moon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.6 6.6 0 0 0 21 12.8z"/></svg>',
  sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>',
  pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 3h6l-1 6 3 3v2H7v-2l3-3z"/><path d="M12 14v7"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>',
  open:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 17L17 7M9 7h8v8"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/><path d="M10 11v6M14 11v6"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.8 4.7L18.5 9.5 13.8 11.3 12 16l-1.8-4.7L5.5 9.5 10.2 7.7z"/><path d="M19 14l.6 1.6 1.6.6-1.6.6L19 19l-.6-1.6-1.6-.6 1.6-.6z"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h12v16H6a2 2 0 0 0-2 2z"/><path d="M18 17H6a2 2 0 0 0-2 2"/></svg>',
  github:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-4 1.4-4-2.2-6-2.7m12 4.7v-3.2c0-.9.1-1.3-.5-1.8 2.7-.3 5.5-1.3 5.5-6a4.5 4.5 0 0 0-1.3-3.2 4.2 4.2 0 0 0-.1-3.2s-1-.3-3.4 1.3a11.5 11.5 0 0 0-6 0C6.4 3.5 5.4 3.8 5.4 3.8a4.2 4.2 0 0 0-.1 3.2A4.5 4.5 0 0 0 4 10.2c0 4.6 2.8 5.6 5.5 6-.6.5-.6 1.1-.5 1.8V21"/></svg>',
  chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5h14a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-8l-4 3v-3H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/><path d="M8 9.5h8M8 12.5h5"/></svg>',
  layers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4-8 4-8-4z"/><path d="M4 12l8 4 8-4"/><path d="M4 17l8 4 8-4"/></svg>',
  file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>',
  windows:'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>',
};
// Inject icons into the rail only (where the __I_x__ placeholders live), not the whole body,
// so this never re-serialises live nodes or wipes listeners.
(function(){ const rail=document.querySelector('.rail'); if(rail){ Object.keys(I).forEach(k => { rail.innerHTML = rail.innerHTML.replace('__I_'+k+'__', I[k]); }); } })();

// ===== State =====
// Board columns are per-project so a human (or Marshal) can add their own — e.g. "Awaiting human
// supervision". The four standard columns are locked (the reasoning loop routes cards through them);
// custom columns are free to add, rename and remove.
const DEFAULT_COLS = [{k:'todo',name:'To do',v:'--todo',locked:true},{k:'doing',name:'In progress',v:'--doing',locked:true},{k:'review',name:'Review',v:'--review',locked:true},{k:'done',name:'Done',v:'--done',locked:true}];
const COL_PALETTE = ['#f59e0b','#22d3ee','#f472b6','#a78bfa','#34d399','#60a5fa','#fb7185','#facc15'];
// The escalation column Marshal creates when the critic is not satisfied and a human must step in.
const AWAIT_HUMAN = {k:'await_human', name:'Awaiting human supervision', v:'#f59e0b', locked:true};
function ensureCols(p){ if(!Array.isArray(p.columns)||!p.columns.length){ p.columns = DEFAULT_COLS.map(c=>({...c})); } return p.columns; }
function cols(p){ return ensureCols(p); }
function colMeta(p,k){ return cols(p).find(c=>c.k===k) || {k,name:k,v:'--muted'}; }
function colColor(v){ return (v||'').startsWith('--') ? 'var('+v+')' : (v||'var(--muted)'); }
function nextColColor(p){ const used=new Set(cols(p).map(c=>c.v)); return COL_PALETTE.find(c=>!used.has(c)) || COL_PALETTE[cols(p).length % COL_PALETTE.length]; }
// Add a column if one with this key/name does not already exist; returns it. Used by humans and by Marshal.
function ensureColumn(p, col){
  const list=cols(p);
  let c=list.find(x=>x.k===col.k || x.name.toLowerCase()===String(col.name||'').toLowerCase());
  if(!c){ c={k:col.k||uid(), name:col.name, v:col.v||nextColColor(p), locked:!!col.locked}; list.push(c); }
  else if(col.locked && !c.locked){ c.locked=true; }   // a locked column (e.g. escalation) can't be left deletable
  return c;
}
const AICOLORS = ['#a855f7','#7c6cff','#d946ef'];
function uid(){ return Math.random().toString(36).slice(2,9); }

// No premade projects: Marshal starts empty and the user creates their own.
function load(key, fallback){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } }
function save(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch(e){} }

const store = {
  projects: load('marshal-projects', []),
  pinned: load('marshal-pins', []),

function wireKanban(p){

// ===== Agents run the board — the real reasoning loop, streamed live over /ws =====
// Local runs use your Claude subscription (mode 'claude', no API key). Foundry/Ollama wiring comes later.
async function runAgents(p, goalArg){
  if(agentsRunning) return;
  agentsRunning = true;                          // claim immediately so a second Run can't race the dialog
  let goal = goalArg;
  let source = 'project';
  let budget = 2.0;
  if(!goal){ const r=await uiPrompt({title:'Run Marshal', fields:[
      {id:'goal',label:'What should Marshal work on?',value:p.desc||p.name,multiline:true},
      {id:'source',label:'Ground answers on',select:true,value:'project',options:groundOptions(),
        hint:'Project notes keeps Marshal grounded on this board. Foundry IQ uses the Microsoft IQ knowledge base.'},
      {id:'budget',label:'Spend limit for this run',select:true,value:'2',options:[
        {value:'0.5',label:'$0.50 · quick'},{value:'2',label:'$2.00 · balanced'},{value:'5',label:'$5.00 · thorough'}],
        hint:'The Budget Governor never exceeds this, and holds back a reserve so it can always finish.'}
    ], okText:'Run'}); goal = r && r.goal && r.goal.trim(); source = (r && r.source) || 'project'; budget = parseFloat(r && r.budget) || 2.0; }
  if(!goal){ agentsRunning = false; return; }     // cancelled
  agentsSpend = 0; runTrace = []; runMeta = {goal, source, project:p.name, projectId:p.id, budget};
  const runStart = Date.now();
  render();
  const reflect = () => { persist(); if(store.current===p.id && store.view==='kanban') render(); };
  // Build a human-readable, timestamped trace entry for each streamed event (the reasoning trace panel).
  const recordTrace = (m) => {
    const dt=((Date.now()-runStart)/1000).toFixed(1); const ct=m.id?((cardOf(m.id)||{}).title||m.id):null; let label='';
    switch(m.type){
      case 'start': label='Run started'; break;
      case 'decompose_start': label='Orchestrator decomposing the question'; break;
      case 'decomposed': label='Decomposed into '+((m.subtasks||[]).length)+' sub-tasks'; break;
      case 'workers_start': label='Dispatching '+(m.count||'')+' workers'+(m.parallel?(' ×'+m.parallel):''); break;
      case 'worker_start': label='Worker started: '+ct; break;
      case 'grounded': { const n=(m.sources||[]).length; label='Grounded "'+ct+'" on '+(m.label||'knowledge')+' ('+n+' source'+(n===1?'':'s')+')'; break; }
      case 'worker_done': label='Draft ready: '+ct+' ('+(m.chars||0)+' chars)'; break;
      case 'graded': label='Critic graded "'+ct+'" → '+m.grade+(m.by?(' ('+m.by+')'):''); break;
      case 'rescope_start': label='Re-scoping weak sub-tasks'; break;
      case 'rescoped': label='Re-scoped and re-running'; break;
      case 'degrade': label='Budget tightening, degrading gracefully'; break;
      case 'synthesise_start': label='Synthesising the final answer'; break;
      case 'done': { const b=m.budget||{}; label='Finished · $'+(b.spent_usd??0)+' · '+(b.charges??'?')+' model calls'; break; }
      case 'refused': label='Declined: '+(m.reason||''); break;
      case 'error': label='Error: '+(m.message||''); break;
      default: return;
    }
    runTrace.push({t:dt, type:m.type, label});
    if($('trace').classList.contains('open')){
      const terminal = (m.type==='done'||m.type==='refused'||m.type==='error');
      const list = $('trace').querySelector('.trace-list');
      if(list && runTrace.length>1 && !terminal){
        // Append just the new row (O(1)) and follow the stream, instead of rebuilding the whole drawer.
        const e=runTrace[runTrace.length-1]; const div=document.createElement('div');
        div.className='trace-row trace-'+e.type; div.innerHTML='<span class="trace-t">+'+e.t+'s</span><span class="trace-l">'+esc(e.label)+'</span>';
        list.appendChild(div); const dr=$('trace').querySelector('.trace-draw'); if(dr) dr.scrollTop=dr.scrollHeight;
      } else renderTrace();   // first row, or terminal event (refresh header, spend, export button)
    }
  };
  const am = activeFoundryModel();
  const tag = am ? '(Foundry · '+am+')' : '(Microsoft Foundry)';
  const idMap = {};                                   // loop sub-task id -> board card id
  const cardOf = sid => p.tasks.find(t=>t.id===idMap[sid]);
  let gotAnything=false, finished=false;
  const groundHits=[];                                // grounding events collected for the result modal's Sources panel
  const weak=new Set();                               // card ids the critic was not satisfied with
  // When the loop finishes, Marshal escalates any card the critic never approved: it creates the
  // "Awaiting human supervision" column (if absent) and moves those cards there for a human to take over.
  const escalateWeak = () => {
    if(!weak.size) return;
    const col=ensureColumn(p, AWAIT_HUMAN);
    const stamp='Escalated by Marshal: the critic was not satisfied after self-correction. Over to you.';
    p.tasks.forEach(t=>{ if(weak.has(t.id)){ t.col=col.k; t.assignee='You'; t.notes = t.notes ? (stamp+'\n\n'+t.notes) : stamp; } });
    toast(weak.size+' card(s) moved to “Awaiting human supervision”.');
  };
  // If the run is cut off (backend disconnects mid-pipeline), don't leave cards stuck in
  // doing/review: hand the in-flight ones to a human rather than silently freezing them.
  const interruptRun = () => {
    const ids=Object.values(idMap); if(!ids.length) return;
    const col=ensureColumn(p, AWAIT_HUMAN); let moved=0;
    p.tasks.forEach(t=>{ if(ids.indexOf(t.id)>=0 && t.col!=='done'){ t.col=col.k; t.assignee='You'; t.notes='Run interrupted before the critic finished. Over to you.'+(t.notes?'\n\n'+t.notes:''); moved++; } });
    if(moved) toast('Run interrupted · '+moved+' card(s) moved to “Awaiting human supervision”.');
  };
  // Knowledge corpus: the project's own notes/cards, sent so workers ground on it.
  const knowledge = projectCorpus(p);
  // Microsoft Foundry is the primary backend (demo is the no-config fallback). Ollama is a planned local add-on.
  if(store.provider==='ollama') toast('Local Ollama execution is a planned add-on; Marshal runs on Foundry for now.');

  let ws;
  try{ ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws'); }
  catch(e){ toast('Could not reach the Marshal backend.'); agentsRunning=false; render(); return; }

  ws.onopen = () => ws.send(JSON.stringify({ question: goal, mode:'foundry', budget, knowledge, source }));
  ws.onmessage = (ev) => {
    let m; try{ m=JSON.parse(ev.data); }catch(_){ return; }
    gotAnything=true;
    if(m.budget && m.budget.spent_usd!=null){ agentsSpend=m.budget.spent_usd; }   // live spend for the working button
    switch(m.type){
      case 'decomposed':
        (m.subtasks||[]).forEach(s=>{ const t={id:uid(),title:s.title||s.id,notes:'Scoped by the orchestrator '+tag+'.',assignee:'Orchestrator',col:'todo'}; p.tasks.push(t); idMap[s.id]=t.id; });
        reflect(); break;
      case 'grounded': { const t=cardOf(m.id); if(t){ t.grounded=(m.sources||[]).length; t.groundLabel=m.label||'knowledge'; } groundHits.push({title:(t&&t.title)||m.id, label:m.label||'knowledge', sources:m.sources||[]}); reflect(); break; }
      case 'worker_start': { const t=cardOf(m.id); if(t){ t.col='doing'; t.notes='Working on it '+tag+'…'; reflect(); } break; }
      case 'worker_done': { const t=cardOf(m.id); if(t){ t.col='review'; t.notes='Draft ready for the critic ('+m.chars+' chars).'; reflect(); } break; }
      case 'graded': { const t=cardOf(m.id); if(t){ if(m.grade==='strong'){ t.col='done'; t.notes='Approved by the critic ('+m.by+').'; weak.delete(t.id); } else { t.col='doing'; t.notes='Critic: '+m.grade+', reworking.'; weak.add(t.id); } reflect(); } break; }
      case 'rescope_start': (m.ids||[]).forEach(id=>{ const t=cardOf(id); if(t) t.notes='Re-scoping per critic feedback…'; }); reflect(); break;
      case 'synthesise_start': toast('Marshal is synthesising the answer…'); break;
      case 'done': { finished=true; agentsRunning=false; const b=m.budget||{}; const ans=deEm(m.answer||''); runMeta.answer=ans; runMeta.spend=b.spent_usd; runMeta.budgetUsd=b.budget_usd; runMeta.charges=b.charges; runMeta.citations=dedupeCitations(groundHits); escalateWeak(); reflect(); render(); showMarshalResult(ans||'(no answer produced)', b, groundHits, p.id); toast('Marshal finished · $'+(b.spent_usd??0)+' · '+(b.charges??'?')+' calls'); break; }
      case 'refused': finished=true; agentsRunning=false; render(); uiInfo({title:'Marshal declined', body:m.reason||'The request was refused.'}); break;
      case 'error': finished=true; agentsRunning=false; render(); toast('Marshal error: '+(m.message||'unknown')); break;
      case 'spend_total': if(spendData){ spendData.total_spend_usd=m.total_spend_usd; spendData.total_runs=m.total_runs; } break;
    }
    recordTrace(m);   // after the switch, so runMeta (answer/spend) is set before the terminal trace render
  };
  ws.onclose = () => { if(!finished){ if(gotAnything) interruptRun(); else toast('Marshal backend closed the connection. Is the server running with WebSocket support?'); } agentsRunning=false; reflect(); };
  ws.onerror = () => { toast('Marshal connection error. Is the backend running?'); agentsRunning=false; reflect(); };
}
// De-duplicate grounding sources across workers into a flat list for display.
function dedupeCitations(groundHits){
  const seen=new Set(), rows=[];
  (groundHits||[]).forEach(h=>(h.sources||[]).forEach(s=>{
    const key=(s.source||'')+'|'+(s.text||'').slice(0,48);
    if(seen.has(key)) return; seen.add(key); rows.push(s);
  }));
  return rows;
}
// Turn a raw grounding source string into a typed chip + clean title.
function citeChip(source){
  if(source==='project') return {tag:'Project', title:'Project overview'};
  const m=/^card:\s*(.*)$/i.exec(source||''); if(m) return {tag:'Card', title:m[1]||'card'};
  return {tag:'Source', title:source||'source'};
}
// Resolve a citation back to the card/board it came from, so it can be clicked.
function resolveCite(projectId, source){
  const p=projectId&&project(projectId); if(!p) return null;

  const matches=(p.tasks||[]).filter(x=>('card: '+x.title.slice(0,36))===source);  // matches projectCorpus labels

}
function citationsHTML(rows, label, ctx){

    const click=r?` role="button" tabindex="0" data-cite-pid="${esc(r.pid)}" data-cite-tid="${esc(r.tid)}"`:'';
    return `<div class="citeitem${r?' clickable':''}"${click}><span class="citen">[${i+1}]</span><div class="citebody"><div class="citesrc"><span class="citetag">${esc(c.tag)}</span>${esc(c.title)}${r?'<span class="citego">open ›</span>':''}</div>${s.text?`<div class="citetext">${esc(s.text)}</div>`:''}</div></div>`;

function uiPrompt({title, fields, okText='Save'}){ return new Promise(res=>{ _modalResolve=res; const body=fields.map(f=>{ const val=esc(f.value||''); const ph=esc(f.placeholder||''); let inp; if(f.select){ inp=`<select id="mp-${f.id}">`+f.options.map(o=>`<option value="${esc(o.value)}" ${o.value===f.value?'selected':''} ${o.disabled?'disabled':''}>${esc(o.label)}</option>`).join('')+`</select>`; } else { inp = f.multiline ? `<textarea id="mp-${f.id}" placeholder="${ph}">${val}</textarea>` : `<input id="mp-${f.id}" type="${f.password?'password':'text'}" value="${val}" placeholder="${ph}" ${f.password?'autocomplete="off"':''}>`; } const hint=f.hint?`<div class="muted" style="font-size:12px;margin-top:5px">${esc(f.hint)}</div>`:''; return `<div class="field"><label>${esc(f.label)}</label>${inp}${hint}</div>`; }).join(''); showModal(`<h3>${esc(title)}</h3>${body}<div class="modal-foot"><button class="btn ghost sm" id="m-cancel">Cancel</button><button class="btn sm" id="m-ok">${esc(okText)}</button></div>`); const submit=()=>{ const out={}; fields.forEach(f=>{ const v=$('mp-'+f.id).value; out[f.id]=(f.multiline||f.select)?v:v.trim(); }); closeModal(out); }; $('m-ok').onclick=submit; $('m-cancel').onclick=()=>closeModal(null); fields.forEach(f=>{ if(!f.multiline && !f.select){ const el=$('mp-'+f.id); if(el) el.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ ev.preventDefault(); submit(); } }); } }); const fe=$('mp-'+fields[0].id); if(fe){ fe.focus(); } }); }

const THEMES=[['dark-purple','Dark purple'],['light-purple','Light purple'],['midnight','Midnight'],['neon','Neon'],['mono','Mono']];
// ===== Foundry connection (D) — connect your own project at runtime via /config and /connect =====
let fcfg=null;
async function loadFoundryConfig(force){
  if(fcfg && !force) return fcfg;
  try{ const ctl=new AbortController(); const to=setTimeout(()=>ctl.abort(),8000); const r=await fetch('/config',{signal:ctl.signal}); clearTimeout(to); fcfg=await r.json(); }
  catch(e){ fcfg={error:String((e&&e.message)||e)}; }
  return fcfg;
}
// ===== Spend + settings (budget monitor, model source, subagents) =====
let spendData=null;
async function loadSpend(force){
  if(spendData && !force) return spendData;
  try{ const ctl=new AbortController(); const to=setTimeout(()=>ctl.abort(),6000);
    const r=await fetch('/spend',{signal:ctl.signal}); clearTimeout(to); spendData=await r.json(); }
  catch(e){ spendData={error:String((e&&e.message)||e)}; }
  return spendData;
}
function fmtUSD(n){ const v=Number(n)||0; return '$'+(v<1 ? v.toFixed(4).replace(/0+$/,'').replace(/\.$/,'') : v.toFixed(2)); }
function foundryStatusHTML(){
  if(!fcfg) return '<span class="muted">checking…</span>';
  if(fcfg.error) return '<span style="color:#e0607e">backend unreachable</span>';
  if(!fcfg.connected) return '<span style="color:#e0607e">not connected</span>';
  if(fcfg.auth_ok) return `<span style="color:var(--done)">connected · ${(fcfg.models||[]).length} deployments</span>`;
  return '<span style="color:var(--review)">endpoint set, not signed in (run az login)</span>';
}
// Build the deployment dropdown options for the Connect modal: an auto-pick option plus each chat deployment.
function connectModelOptions(chatModels, current){
  const opts=[{value:'', label:'Auto — first chat model'}];
  (chatModels||[]).forEach(function(name){ opts.push({value:name, label:name}); });
  if(current && !(chatModels||[]).includes(current)) opts.push({value:current, label:current+' (current)'});
  return opts;
}
async function connectFoundry(){
  const cur=fcfg||{};
  const r1=await uiPrompt({title:'Connect Microsoft Foundry', fields:[
    {id:'endpoint',label:'Project endpoint',value:cur.project_endpoint||'',placeholder:'https://<resource>.services.ai.azure.com/api/projects/<project>',hint:'From the Foundry portal. Sign in first in your terminal with:  az login'}
  ], okText:'Next'});
  if(!r1) return;
  const ep=(r1.endpoint||'').trim(); if(!ep){ toast('Enter your project endpoint.'); return; }
  toast('Reading your deployments…');
  let chat=null;
  try{
    const res=await fetch('/deployments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project_endpoint:ep})});
    const d=await res.json();
    if(d.ok){ chat=d.chat_models||[]; }
    else { uiInfo({title:'Could not read deployments', body:(d.error||'Failed.')+(d.auth_hint?('  '+d.auth_hint):'')}); return; }
  }catch(e){ uiInfo({title:'Could not read deployments', body:'Could not reach the backend.'}); return; }
  const curModel=(ep===(cur.project_endpoint||''))?(cur.worker_model||''):'';
  const r2=await uiPrompt({title:'Connect Microsoft Foundry', fields:[
    {id:'worker',label:'Reasoning model',select:true,value:curModel,options:connectModelOptions(chat,curModel),
      hint:(chat&&chat.length)?'One deployment drives Marshal\'s reasoning. The chat picker overrides it per chat.':'No chat deployments found — deploy a model in Foundry, or use Auto.'}
  ], okText:'Connect'});
  if(!r2) return;
  toast('Connecting to Foundry…');
  try{
    const res=await fetch('/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project_endpoint:ep, worker_model:(r2.worker||'').trim()})});
    const data=await res.json();
    if(!data.ok){ uiInfo({title:'Could not connect', body:(data.error||'Connection failed.')+(data.auth_hint?('  '+data.auth_hint):'')}); return; }
    toast('Connected. '+(data.models||[]).length+' deployment(s) available.');
    fcfg=null; modelData=null; await loadFoundryConfig(true); await loadModels(true); await loadConfig(); render();
  }catch(e){ uiInfo({title:'Could not connect', body:'Could not reach the backend.'}); }
}

// ===== Per-role models (each of Marshal's four agents can run a different deployment) =====
function modelChoices(){
  const out=[];
  ((modelData&&modelData.foundry&&modelData.foundry.deployments)||[]).filter(d=>d.kind!=='embedding').forEach(d=> out.push({v:d.name, l:(d.model||d.name)+' · Foundry'}));
  ((modelData&&modelData.ollama&&modelData.ollama.models)||[]).forEach(m=> out.push({v:m, l:m+' · Ollama'}));
  return out;
}
function roleModelsPanelHTML(){
  if(!fcfg || !fcfg.connected) return `<div class="panel"><h2>Per-role models</h2><p class="h">Connect Microsoft Foundry first, then give each of Marshal's four agents its own model.</p></div>`;
  const choices=modelChoices();
  const ROLES=[['orchestrator_model','Orchestrator','decomposes the question into sub-tasks'],['worker_model','Worker','solves each sub-task in parallel'],['critic_model','Critic','grades answers and drives self-correction'],['synthesiser_model','Synthesiser','fuses the graded answers into the final answer']];
  const rows=ROLES.map(function(r){
    const key=r[0], cur=(fcfg&&fcfg[key])||'';
    const has=choices.some(c=>c.v===cur);
    const opts=(has?'':`<option value="${esc(cur)}" selected>${esc(cur||'—')} (current)</option>`)+choices.map(c=>`<option value="${esc(c.v)}" ${c.v===cur?'selected':''}>${esc(c.l)}</option>`).join('');
    return `<div class="row"><div><strong>${r[1]}</strong><div class="muted" style="font-size:12px">${r[2]}</div></div><select data-role="${key}">${opts}</select></div>`;
  }).join('');
  return `<div class="panel"><h2>Per-role models</h2><p class="h">Marshal runs four agents. Give each its own model, for example a stronger critic with cheaper workers. Options are your Foundry deployments and any local Ollama models.</p>
    ${rows}
    <div class="row" style="border-top:0;padding-top:10px;justify-content:space-between;gap:8px"><button class="btn sm ghost" id="s-roles-same">Match all to Worker</button><button class="btn sm" id="s-roles-save">Save role models</button></div></div>`;
}

// ===== Marshal Workshop (self-upgrading: Marshal designs itself new capabilities) =====
let workshopCaps=null;
async function loadWorkshop(force){
  if(workshopCaps && !force) return workshopCaps;
  try{ const r=await fetch('/workshop/list'); const d=await r.json(); workshopCaps=d.capabilities||[]; }catch(e){ workshopCaps=[]; }

}
function workshopHTML(){
  const caps=workshopCaps||[];
  const list = caps.length ? caps.map(workshopCard).join('') : `<div class="empty"><div class="eicon">${I.spark}</div><h3>No capabilities yet</h3><p>Describe something you wish Marshal could do. It designs itself a new specialised agent for it, on the spot.</p></div>`;
  return `<div class="settings-wrap">
    <div class="panel"><h2>Marshal Workshop</h2><p class="h">Marshal is self-upgrading. Describe a capability it does not have yet, and it designs itself a new specialised agent for it, running on your Foundry models. The new skill is saved and ready to use straight away.</p>

function workshopCard(c){

      <div style="flex:1;min-width:0"><h2 style="margin:0">${esc(c.title||c.name)}</h2><p class="h" style="margin:6px 0 0">${esc(c.description||'')}</p></div>
      <button class="iconbtn" data-ws-del="${esc(c.name)}" title="Remove">${I.trash}</button></div>
    <textarea data-ws-in="${esc(c.name)}" placeholder="${esc(c.example||'Give it something to work on…')}" style="width:100%;min-height:60px;margin-top:8px"></textarea>

function wireWorkshop(){
  const build=$('ws-build');
  if(build) build.onclick=async function(){
    const p=($('ws-prompt').value||'').trim(); if(!p){ toast('Describe a capability first.'); return; }
    build.textContent='Building…'; build.disabled=true;
    try{ const r=await fetch('/workshop/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p})}); const d=await r.json();
      if(d.ok){ toast('Marshal built: '+(d.capability.title||d.capability.name)); workshopCaps=null; await loadWorkshop(true); render(); }
      else { uiInfo({title:'Could not build it', body:d.error||'Try describing it differently.'}); build.innerHTML=I.spark+' Build capability'; build.disabled=false; } }
    catch(e){ toast('Backend unreachable.'); build.innerHTML=I.spark+' Build capability'; build.disabled=false; }
  };
  document.querySelectorAll('[data-ws-run]').forEach(function(b){ b.onclick=async function(){
    const name=b.dataset.wsRun, inEl=document.querySelector('[data-ws-in="'+CSS.escape(name)+'"]'), out=document.querySelector('[data-ws-out="'+CSS.escape(name)+'"]');
    const input=((inEl&&inEl.value)||'').trim(); if(!input){ toast('Enter something to run.'); return; }
    b.textContent='Running…'; b.disabled=true; out.innerHTML='<div class="muted" style="padding:10px 0">Marshal is working…</div>';
    try{ const r=await fetch('/workshop/invoke',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,input:input})}); const d=await r.json();
      out.innerHTML = d.ok ? `<div class="panel" style="margin:10px 0 0;background:var(--surface2)"><div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Output</div><div style="white-space:pre-wrap;line-height:1.55">${esc(d.output||'')}</div></div>` : `<div class="muted" style="color:#e0607e;padding:10px 0">${esc(d.error||'Failed.')}</div>`; }
    catch(e){ out.innerHTML='<div class="muted" style="color:#e0607e;padding:10px 0">Backend unreachable.</div>'; }
    b.textContent='Run capability'; b.disabled=false;
  }; });
  document.querySelectorAll('[data-ws-del]').forEach(function(b){ b.onclick=async function(){
    await fetch('/workshop/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:b.dataset.wsDel})}); workshopCaps=null; await loadWorkshop(true); toast('Capability removed.'); render();
  }; });
}

function budgetPanelHTML(){
  const s = spendData || {};
  const total = s.error ? '—' : fmtUSD(s.total_spend_usd);
  const runs  = s.error ? '' : (' · '+(s.total_runs||0)+' run'+((s.total_runs===1)?'':'s'));
  const curBudget = (s.budget_usd!=null) ? String(s.budget_usd) : ((fcfg&&fcfg.budget_usd!=null)?String(fcfg.budget_usd):'0.5');
  const PRESETS=[['0.25','$0.25 · quick'],['0.5','$0.50 · balanced'],['1','$1.00'],['2','$2.00 · thorough'],['5','$5.00 · deep']];
  const has = PRESETS.some(p=>p[0]===curBudget);
  const opts = (has?'':`<option value="${esc(curBudget)}" selected>$${esc(curBudget)} · current</option>`)
    + PRESETS.map(p=>`<option value="${p[0]}" ${p[0]===curBudget?'selected':''}>${p[1]}</option>`).join('');
  return `<div class="panel"><h2>Budget and spend</h2>
    <p class="h">Marshal's Budget Governor caps spend per question and holds back a reserve so it can always finish. This is the lifetime total across every run (demo runs included).</p>
    <div class="row"><div>Spent so far</div><div style="text-align:right;font-size:18px;font-weight:600">${total}<span class="muted" style="font-size:12px;font-weight:400">${runs}</span></div></div>
    <div class="row"><div>Per-question budget<div class="muted" style="font-size:12px">The default cap for each run. The run dialog can still override it.</div></div>
      <select id="s-budget">${opts}</select></div>
    <div class="row" style="border-top:0;padding-top:10px;justify-content:space-between;gap:8px">
      <button class="btn sm ghost" id="s-spend-reset">Reset spend counter</button>
      <button class="btn sm" id="s-budget-save">Save budget</button></div></div>`;
}

function wireSettings(){
  $('s-theme').onchange=e=>applyTheme(e.target.value);
  const ns=$('s-notes-save'); if(ns) ns.onclick=()=>{ store.profileNotes=($('s-notes').value||'').slice(0,8000); save('marshal-notes',store.profileNotes); ns.textContent='Saved'; setTimeout(()=>{ns.textContent='Save master file';},1200); };
  const md=$('s-notes-md'); if(md) md.onclick=()=>{ store.profileNotes=$('s-notes').value; save('marshal-notes',store.profileNotes); downloadMasterFile(); };
  const su=$('s-setup'); if(su) su.onclick=()=>openWizard();
  const sc=$('s-connect'); if(sc) sc.onclick=()=>connectFoundry();
  const rsave=$('s-roles-save'); if(rsave) rsave.onclick=async()=>{
    const body={}; document.querySelectorAll('[data-role]').forEach(s=> body[s.dataset.role]=s.value);
    rsave.textContent='Saving…'; rsave.disabled=true;
    try{ const r=await fetch('/set-models',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); const d=await r.json();
      if(d.ok){ fcfg=null; await loadFoundryConfig(true); toast('Role models saved.'); render(); }
      else { toast('Could not save role models.'); rsave.textContent='Save role models'; rsave.disabled=false; } }
    catch(e){ toast('Backend unreachable.'); rsave.textContent='Save role models'; rsave.disabled=false; }
  };
  const rsame=$('s-roles-same'); if(rsame) rsame.onclick=()=>{ const w=document.querySelector('[data-role="worker_model"]'); if(!w) return; document.querySelectorAll('[data-role]').forEach(s=> s.value=w.value); toast('Set all roles to '+w.value+'. Save to apply.'); };

  // --- Budget ---
  const bsave=$('s-budget-save'); if(bsave) bsave.onclick=async()=>{
    const val=parseFloat(($('s-budget')||{}).value)||0.5;
    bsave.textContent='Saving…'; bsave.disabled=true;
    try{ const r=await fetch('/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({budget_usd:val})});
      const d=await r.json(); if(d.ok){ if(spendData) spendData.budget_usd=d.budget_usd; if(fcfg) fcfg.budget_usd=d.budget_usd; toast('Per-question budget set to '+fmtUSD(d.budget_usd)+'.'); }
      else toast('Could not save budget.'); }
    catch(e){ toast('Backend unreachable.'); }
    bsave.textContent='Save budget'; bsave.disabled=false;
  };
  const breset=$('s-spend-reset'); if(breset) breset.onclick=async()=>{
    const ok=await uiConfirm({title:'Reset spend counter?', body:'This clears the lifetime spend total and run count. It does not affect any run.', okText:'Reset'});
    if(!ok) return;
    try{ const r=await fetch('/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reset_spend:true})});
      const d=await r.json(); if(d.ok){ spendData=null; await loadSpend(true); toast('Spend counter reset.'); render(); } }
    catch(e){ toast('Backend unreachable.'); }
  };

  // --- Model source (WARNING before switching to local) ---
  document.querySelectorAll('#s-source-seg [data-src]').forEach(b=> b.onclick=async()=>{
    const target=b.dataset.src;
    const cur=((spendData&&spendData.model_source)||(fcfg&&fcfg.model_source)||'foundry');
    if(target===cur) return;
    if(target==='local'){
      const ok=await uiConfirm({
        title:'Switch to local models?',
        body:'Local models run on an Ollama daemon on this PC. They are MUCH slower than Foundry unless you have a strong machine (a capable GPU and plenty of RAM). Responses may take minutes, and large models may not run at all. Note: local routing is still being wired, so runs currently fall back to Foundry. You can switch back any time.',
        okText:'Save local preference', cancelText:'Stay on Foundry'});
      if(!ok) return;
    }
    try{ const r=await fetch('/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model_source:target})});
      const d=await r.json(); if(d.ok){
        if(spendData) spendData.model_source=d.model_source; if(fcfg) fcfg.model_source=d.model_source;
        toast(target==='local'?'Saved local as your preference.':'Switched to Microsoft Foundry.'); render(); }
      else toast('Could not change model source.'); }
    catch(e){ toast('Backend unreachable.'); }
  });

  // --- Subagents ---
  const subEn=$('s-sub-enabled'), subAi=$('s-sub-ai');

function wireChat(){
  const box=$('chat-msgs'); if(box) box.scrollTop=box.scrollHeight;
  const clr=$('chat-clear'); if(clr) clr.onclick=async()=>{ if(!store.chat.messages.length) return; const ok=await uiConfirm({title:'Clear chat?',body:'This removes the current conversation.',okText:'Clear',danger:true}); if(ok){ store.chat.messages=[]; persist(); render(); } };
  const sel=$('chat-source'); if(sel) sel.onchange=()=>{ store.chat.source=sel.value; persist(); render(); };
  const psel=$('chat-project'); if(psel) psel.onchange=()=>onChatProjectPick(psel.value);

  const ta=$('chat-text'), send=$('chat-send');

async function sendChat(){
  if(chatBusy) return;
  const ta=$('chat-text'); const text=(ta&&ta.value||'').trim(); if(!text) return;
  chatBusy=true;
  const source=store.chat.source||'project';
  const gp = source==='none' ? null : chatGroundProject();
  const knowledge = gp ? projectCorpus(gp) : [];
  store.chat.messages.push({role:'me',text});
  const history=store.chat.messages.slice(0,-1).map(m=>({role:m.role==='me'?'user':'assistant',content:m.text}));
  persist(); render();
  const box=$('chat-msgs');
  if(box){ const tip=document.createElement('div'); tip.className='msg ai'; tip.id='chat-typing'; tip.innerHTML='<span class="who">M</span><div class="bubble typing">Marshal is thinking…</div>'; box.appendChild(tip); box.scrollTop=box.scrollHeight; }
  let reply, citations=[], groundLabel='';
  try{
    const names=chatModels().map(d=>d.name); const model=(store.chat.model && names.includes(store.chat.model)) ? store.chat.model : '';
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text, history, source, knowledge, model, profile:(store.profileNotes||'').slice(0,6000)})});
    const data=await res.json();
    reply = deEm(data.reply || data.error || '(no reply)');
    citations = data.citations || []; groundLabel = data.groundLabel || '';
  }catch(e){ reply='Could not reach the chat backend. Is the server running?'; }
  await typeReply(reply);   // stream the reply in, instead of dropping it instantly
  store.chat.messages.push({role:'ai',text:reply,citations,groundLabel,groundProject:gp?gp.id:''});
  chatBusy=false; persist();
  if(store.view==='chat') render();
}
// Typewriter the reply into the pending "thinking" bubble, so it feels generated, not pasted.
function typeReply(text){
  return new Promise(res=>{
    const tip=$('chat-typing'), box=$('chat-msgs');
    if(!tip){ res(); return; }
    tip.removeAttribute('id'); tip.innerHTML='<span class="who">M</span><div class="bubble"></div>';
    const bubble=tip.querySelector('.bubble');
    let reduce=false; try{ reduce=matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}
    if(reduce || !text){ bubble.textContent=text||''; if(box) box.scrollTop=box.scrollHeight; res(); return; }
    // Time-based so it always completes in ~dur, even if a background tab throttles the interval.
    const dur=Math.min(3000, Math.max(700, text.length*10)); const start=Date.now();
    const iv=setInterval(()=>{
      const p=Math.min(1,(Date.now()-start)/dur);
      bubble.textContent=text.slice(0, Math.ceil(p*text.length));
      if(box) box.scrollTop=box.scrollHeight;
      if(p>=1){ clearInterval(iv); res(); }
    }, 16);
  });
}
